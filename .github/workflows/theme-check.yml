name: Theme Check

# Runs `shopify theme check` on every pull request. The check fails only on
# errors (fail-level: error), matching the local pre-commit signal defined by
# .theme-check.yml. Warnings (e.g. OrphanedSnippet) are advisory and do not
# fail the build. See CLAUDE.md > "shopify theme check must be clean before
# committing" for the rationale behind the disabled checks.

on:
  pull_request:

# Cancel a stale run when new commits are pushed to the same PR.
concurrency:
  group: theme-check-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write # required for the action to post inline check annotations

jobs:
  theme-check:
    name: Theme Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the action can diff against the PR base and scope
          # annotations to changed files only.
          fetch-depth: 0

      - name: Run Theme Check
        uses: Shopify/theme-check-action@v2
        with:
          token: ${{ github.token }}
          base: ${{ github.event.pull_request.base.sha }}
          flags: "--fail-level error"
